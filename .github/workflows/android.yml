name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "capacitor.config.json"
      - "mobile/**"
      - "assets/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Generate launcher icon + splash
        run: >
          npx @capacitor/assets generate --android
          --iconBackgroundColor '#08070F' --iconBackgroundColorDark '#08070F'
          --splashBackgroundColor '#08070F' --splashBackgroundColorDark '#08070F'

      - name: Sync web config into Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk syncwave.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncwave-apk
          path: syncwave.apk
          if-no-files-found: error

      - name: Publish Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-${{ github.run_number }}
          name: SyncWave Mobile · build ${{ github.run_number }}
          body: |
            📱 **SyncWave for Android (Earth-1610)** — sideload build.

            Same UI, same Supabase realtime DB as the web app; the app's WebView
            loads the live site, with a native spider-web icon + ink splash.

            **Install:** download `syncwave.apk`, open it on your phone, and allow
            "install from unknown sources" when prompted.
          files: syncwave.apk
